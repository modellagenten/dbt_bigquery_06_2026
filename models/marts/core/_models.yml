version: 2

models:
  - name: fct_order
    description: "Facts Orders"
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              arguments: # available in v1.10.5 and higher. Older versions can set the <argument_name> as the top-level property.
                values:
                  ["Complete", "Processing", "Shipped", "Cancelled", "Returned"]
