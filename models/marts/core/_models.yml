version: 2

models:
  - name: fct_order_items
    description: "blah"

    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null

  - name: int_order_items_enriched
    columns:
      - name: cost
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "cost > 0"

  - name: fct_orders
    description: "Facts Orders"
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  ["Complete", "Processing", "Shipped", "Cancelled", "Returned"]
  - name: dim_users
    description: "Users."
    columns:
      - name: user_id
        description: "User Id."
        tests:
          - unique
          - not_null  
      - name: email
        tests:
          - not_null
#      - name: first_order_at
#        tests:
#          - not_null



  - name: dim_products
    description: "Produkt, angereichert um Verkaufskennzahlen, wie Gesamtanzahl der verkauften Produkte, Gesamterlös, Erstes und Letztes verkauftes Produkt."
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: category
        data_tests:
          - not_null          

  - name: fct_daily_orders
    description: "Bestellungen aggregiert auf Tagesebene (Incremental)."
    columns:
      - name: order_day
        description: "Bestelldatum (Tag)."
        tests:
          - unique
          - not_null
      - name: n_orders
        tests:
          - not_null
