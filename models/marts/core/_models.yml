version: 2

models:
  - name: fct_order_items
    description: "blah"

    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null

  - name: int_order_items_enriched
    columns:
      - name: cost
        data_tests:
          - not_null


    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "cost > 0"

